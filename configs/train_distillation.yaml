# @package _global_

defaults:
  - _self_
  - data: nuscenes_pred.yaml
  - model: TGRIPPredictorDistill.yaml
  - callbacks: default_pl.yaml
  - plugins: null
  - logger: default_pl.yaml
  - trainer: ddp_pl.yaml
  - paths: default.yaml
  - extras: default.yaml
  - hydra: default.yaml
  - losses@model.loss_kwargs.segm_type: cewithlogit.yaml
  - optional local: default.yaml
  - debug: null

# task name, determines output directory path
task_name: "train_distillation"

tags: ["dev"]
train: True
test: False
profile: False

# simply provide checkpoint path to resume training
ckpt:
  resume: False
  path: 'checkpoints/BEVPredFormer_scale05.ckpt'
  model:
    freeze: null
    load: ['net.backbone', 'net.neck', 'net.view_transform', 'net.decoder', 'net.coord_selector',
            'net.temporal', 'net.query_gen', 'net.heads']

# seed for random number generators in pytorch, numpy and python.random
seed: null

log_every_n_steps: 50 

flags:
  debug: false
  val_sparse: false

model:
  # Teacher-student specific (defaults in model config, exposed here for convenience)
  teacher_ckpt_path: "checkpoints/TGRIP_visual_semantic.ckpt"

  distill_kwargs:
    alpha: 0.7
    temperature: 4.0
  
  text_encoder:
    _target_: tgrip.models.text_encoder.CLIPEncoder
    model_name: "openai/clip-vit-base-patch16"
  
  loss_kwargs:
    with_binimg: ${data.keep_input_binimg}
    pos_weight: 2.13
    with_hdmap: ${data.keep_input_hdmap}
    hdmap_names: ${data.hdmap_names}
    with_centr_offs: ${data.keep_input_centr_offs}
    with_flow: ${data.keep_input_flow_map}
    with_semantic_map: ${data.keep_input_semantic_maps}
    compress_persp: False
    segm_type: null

  weights_kwargs:
    mode: "learned"

  train_kwargs:
    train_loss_frequency: 200
    train_visu_frequency: 1000
    train_visu_epoch_frequency: 10
    train_visu_imgs: false

  val_kwargs:
    val_visu_frequency: 250
    val_visu_imgs: false
    val_calculate_losses: False
    
  metric_kwargs:
    with_dynamic_tag: false
    with_sampler: ${data.keep_input_sampling}
    with_distance: false
    with_flow: ${data.keep_input_flow_map}
    only_val: true 
    track_mem: False
    pts_thresh: 0.
    
  temporal_kwargs:
    cam_T_P: ${data.cam_T_P}
    bev_T_P: ${data.bev_T_P}

  grid: ${data.grid}
